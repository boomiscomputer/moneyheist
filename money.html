                    </div>
                </div>
            `;
            document.getElementById(`round_views_${itemId}`).appendChild(roundView);

            roundInstances[roundId] = { groupCount: 0, subItemCount: 0, groupData: {} };

            if (loadedData) {
                restoreRound(roundId, loadedData);
            } else if (isFirst) {
                addGroup(roundId); addGroup(roundId);
                setTimeout(() => {
                    const sel = document.getElementById(`select_${roundId}`);
                    if(sel && sel.options.length > 1) { sel.selectedIndex = 1; onGroupSelectChange(roundId); }
                }, 50);
            } else {
                saveToUndoHistory(); 
                const prevRoundId = itemState.rounds[itemState.rounds.length - 2];
                copyRound(prevRoundId, roundId);
                switchRound(itemId, roundId);
            }
        }

        function switchRound(itemId, roundId) {
            document.querySelectorAll(`#round_tabs_${itemId} .round-tab`).forEach(t => t.classList.remove('active'));
            document.querySelectorAll(`#round_views_${itemId} .round-view`).forEach(v => v.classList.remove('active'));
            document.getElementById(`tab_${roundId}`).classList.add('active');
            document.getElementById(`view_${roundId}`).classList.add('active');
        }

        function deleteRound(itemId, roundId, event) {
            event.stopPropagation();
            if(confirm('ยืนยันการลบรอบการคำนวณนี้?')) {
                saveToUndoHistory();
                document.getElementById(`tab_${roundId}`).remove();
                document.getElementById(`view_${roundId}`).remove();
                delete roundInstances[roundId];
                itemInstances[itemId].rounds = itemInstances[itemId].rounds.filter(id => id !== roundId);
                updateRoundTabs(itemId);
                switchRound(itemId, itemInstances[itemId].rounds[0]);
                calculateOurGroupTotal(itemId);
            }
        }

        function updateRoundTabs(itemId) {
            itemInstances[itemId].rounds.forEach((rId, index) => {
                const tab = document.getElementById(`tab_${rId}`);
                if(tab) tab.querySelector('span:first-child').textContent = `รอบ ${index + 1}`;
            });
        }

        function copyRound(prevId, newId) {
            document.getElementById(`income_${newId}`).value = '';
            document.getElementById(`cost_${newId}`).value = '';
            document.getElementById(`limit_${newId}`).value = document.getElementById(`limit_${prevId}`).value;

            const prevState = roundInstances[prevId];
            for (let gId in prevState.groupData) {
                const g = prevState.groupData[gId];
                const gName = document.querySelector(`#${gId} .g-name`).value;
                const gPct = document.querySelector(`#${gId} .g-pct`).value;

                roundInstances[newId].groupCount++;
                const newGId = `${newId}_g_${roundInstances[newId].groupCount}`;
                
                const timeStr = Date.now() + Math.floor(Math.random()*10000);
                const newSubs = g.subItems.map((s, idx) => {
                    const newTeamMembers = (s.teamMembers || []).map((tm, tmIdx) => ({
                        id: `${newGId}_s_${timeStr}_${idx}_tm_${tmIdx}`,
                        name: tm.name,
                        pct: tm.pct
                    }));
                    return { 
                        id: `${newGId}_s_${timeStr}_${idx}`, 
                        name: s.name, 
                        pct: s.pct,
                        isOptOut: s.isOptOut || false,
                        isStarred: s.isStarred || false,
                        teamMembers: newTeamMembers,
                        teamCalcMode: s.teamCalcMode || 'pct'
                    };
                });
                
                roundInstances[newId].groupData[newGId] = { 
                    amt: 0, pct: g.pct, expandPct: g.expandPct, isOptOut: g.isOptOut || false, subItems: newSubs 
                };

                const optOutClass = g.isOptOut ? 'opted-out-box' : '';
                const btnText = g.isOptOut ? 'กลับเข้า' : 'ออก';
                const btnClass = g.isOptOut ? 'leave-btn active' : 'leave-btn';

                const html = `
                    <div class="group-box ${optOutClass}" id="${newGId}">
                        <div class="group-header">
                            <input type="text" class="g-name" placeholder="ชื่อกลุ่ม" value="${gName.replace(/"/g, '&quot;')}" oninput="calculateAll('${newId}')">
                            <button class="remove-btn" onclick="removeGroup('${newId}', '${newGId}')">ลบ</button>
                            <button class="${btnClass}" onclick="toggleGroupOptOut('${newId}', '${newGId}')">${btnText}</button>
                        </div>
                        <div class="input-group" style="margin-bottom:0;">
                            <label>ส่วนแบ่ง (%):</label>
                            <input type="text" inputmode="decimal" class="g-pct" placeholder="0" value="${gPct}" onkeydown="allowOnlyNumbers(event)" oninput="formatPercentInput(this, 'all', '${newId}')">
                        </div>
                        <div class="result-box">ยอดรวมกลุ่ม: <span class="highlight-text g-amt">0</span> บาท</div>
                    </div>
                `;
                document.getElementById(`groupList_${newId}`).insertAdjacentHTML('beforeend', html);
                roundInstances[newId].subItemCount = Math.max(roundInstances[newId].subItemCount, newSubs.length);
            }

            updateGroupSequence(newId);
            calculateAll(newId);

            const prevSelIdx = document.getElementById(`select_${prevId}`).selectedIndex;
            setTimeout(() => {
                document.getElementById(`select_${newId}`).selectedIndex = prevSelIdx;
                onGroupSelectChange(newId);
            }, 50);
        }

        function restoreItem(itemData, isFirst) {
            const itemId = itemData.id;
            itemInstances[itemId] = { roundCounter: itemData.roundCounter || itemData.rounds.length, rounds: [] };
            
            const menuHTML = `
                <div class="menu-item calc-tab" id="menu_${itemId}" onclick="switchTab('${itemId}')">
                    <span class="menu-title">${itemData.title}</span>
                    <span class="delete-icon" onclick="deleteItem('${itemId}', event)" style="display:${isFirst?'none':'inline'};">✖</span>
                </div>
            `;
            document.getElementById('sidebar-menu').insertAdjacentHTML('beforeend', menuHTML);

            const viewHTML = `
                <div class="view-panel calc-view" id="view_${itemId}">
                    <input type="text" class="project-name-input" id="projectName_${itemId}" value="${itemData.projectName || ''}" placeholder="กรอกชื่องาน (เช่น งานตึก A)..." oninput="updateItemTitle('${itemId}')">
                    <div class="round-tabs" id="round_tabs_${itemId}">
                        <button class="add-round-btn" onclick="addRound('${itemId}')">+ เพิ่มรอบ</button>
                        <div class="our-group-total-badge" id="our_group_total_${itemId}">
                            ⭐ รวมกลุ่มเรา: <span style="color:#d32f2f; margin-left: 5px;">0 บ.</span>
                        </div>
                    </div>
                    <div id="round_views_${itemId}"></div>
                </div>
            `;
            document.getElementById('main-content').insertAdjacentHTML('beforeend', viewHTML);
            
            document.getElementById(`menu_${itemId}`).dataset.baseTitle = `รายการ ${isFirst ? 1 : document.querySelectorAll('.menu-item.calc-tab').length}`;

            itemData.rounds.forEach((rData, rIdx) => {
                addRound(itemId, rIdx === 0, rData);
            });
            
            updateItemTitle(itemId); 
            calculateOurGroupTotal(itemId);
        }

        function restoreRound(roundId, roundData) {
            document.getElementById(`income_${roundId}`).value = roundData.income;
            document.getElementById(`cost_${roundId}`).value = roundData.cost;
            document.getElementById(`limit_${roundId}`).value = roundData.limit;

            const rIndex = getRoundIndex(roundId);
            const showLeave = rIndex > 0 ? 'inline-block' : 'none';

            roundInstances[roundId].groupCount = roundData.groupCount || 0;
            roundInstances[roundId].subItemCount = roundData.subItemCount || 0;

            roundData.groups.forEach((g, index) => {
                const gId = g.id;
                roundInstances[roundId].groupData[gId] = {
                    amt: 0, pct: parseFloat(String(g.pct).replace(/,/g, '')) || 0,
                    expandPct: parseFloat(String(g.expandPct).replace(/,/g, '')) || 0,
                    isOptOut: g.isOptOut || false,
                    subItems: g.subItems || []
                };

                const optOutClass = g.isOptOut ? 'opted-out-box' : '';
                const btnText = g.isOptOut ? 'กลับเข้า' : 'ออก';
                const btnClass = g.isOptOut ? 'leave-btn active' : 'leave-btn';

                const gHtml = `
                    <div class="group-box ${optOutClass}" id="${gId}">
                        <div class="group-header">
                            <input type="text" class="g-name" placeholder="ชื่อกลุ่ม" value="${(g.name||'').replace(/"/g, '&quot;')}" oninput="calculateAll('${roundId}')">
                            <button class="remove-btn" onclick="removeGroup('${roundId}', '${gId}')">ลบ</button>
                            <button class="${btnClass}" style="display:${showLeave};" onclick="toggleGroupOptOut('${roundId}', '${gId}')">${btnText}</button>
                        </div>
                        <div class="input-group" style="margin-bottom:0;">
                            <label>ส่วนแบ่ง (%):</label>
                            <input type="text" inputmode="decimal" class="g-pct" placeholder="0" value="${g.pct}" onkeydown="allowOnlyNumbers(event)" oninput="formatPercentInput(this, 'all', '${roundId}')">
                        </div>
                        <div class="result-box">ยอดรวมกลุ่ม: <span class="highlight-text g-amt">0</span> บาท</div>
                    </div>
                `;
                document.getElementById(`groupList_${roundId}`).insertAdjacentHTML('beforeend', gHtml);
            });
            
            updateGroupSequence(roundId);
            calculateAll(roundId);

            if (roundData.selectedGroup) {
                setTimeout(() => {
                    const select = document.getElementById(`select_${roundId}`);
                    if(select) {
                        select.value = roundData.selectedGroup;
                        onGroupSelectChange(roundId);
                    }
                }, 50);
            }
        }

        function addGroup(roundId) {
            const state = roundInstances[roundId];
            state.groupCount++;
            const groupId = `${roundId}_g_${state.groupCount}`;
            const rIndex = getRoundIndex(roundId);
            const showLeave = rIndex > 0 ? 'inline-block' : 'none';
            
            const tStr = Date.now() + Math.floor(Math.random()*1000);
            state.groupData[groupId] = {
                amt: 0, pct: 0, expandPct: 0, isOptOut: false,
                subItems: [ 
                    { id: `${groupId}_s_${tStr}_1`, name: '', pct: '', isOptOut: false, isStarred: false, teamMembers: [], teamCalcMode: 'pct' }, 
                    { id: `${groupId}_s_${tStr}_2`, name: '', pct: '', isOptOut: false, isStarred: false, teamMembers: [], teamCalcMode: 'pct' } 
                ]
            };

            const html = `
                <div class="group-box" id="${groupId}">
                    <div class="group-header">
                        <input type="text" class="g-name" placeholder="ชื่อกลุ่ม" oninput="calculateAll('${roundId}')">
                        <button class="remove-btn" onclick="removeGroup('${roundId}', '${groupId}')">ลบ</button>
                        <button class="leave-btn" style="display:${showLeave};" onclick="toggleGroupOptOut('${roundId}', '${groupId}')">ออก</button>
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label>ส่วนแบ่ง (%):</label>
                        <input type="text" inputmode="decimal" class="g-pct" placeholder="0" onkeydown="allowOnlyNumbers(event)" oninput="formatPercentInput(this, 'all', '${roundId}')">
                    </div>
                    <div class="result-box">ยอดรวมกลุ่ม: <span class="highlight-text g-amt">0</span> บาท</div>
                </div>
            `;
            document.getElementById(`groupList_${roundId}`).insertAdjacentHTML('beforeend', html);
            updateGroupSequence(roundId);
            calculateAll(roundId);
        }

        function removeGroup(roundId, groupId) {
            saveToUndoHistory();
            document.getElementById(groupId).remove();
            const state = roundInstances[roundId];
            delete state.groupData[groupId];
            updateGroupSequence(roundId);
            calculateAll(roundId);

            const select = document.getElementById(`select_${roundId}`);
            if (select.value === groupId || select.value === '') {
                select.selectedIndex = 0;
                renderSidePanel(roundId);
            }
        }

        function updateGroupSequence(roundId) {
            const groups = document.querySelectorAll(`#groupList_${roundId} .group-box`);
            groups.forEach((group, index) => {
                const num = index + 1;
                group.querySelector('.g-name').placeholder = `กลุ่มที่ ${num} / ชื่อ`;
                const rBtn = group.querySelector('.remove-btn');
                if (num <= 2) { if(rBtn) rBtn.style.display = 'none'; } 
                else { if(rBtn) rBtn.style.display = 'inline-block'; }
            });
        }

        function calculateAll(roundId) {
            const state = roundInstances[roundId];
            const income = getRawNumber(`income_${roundId}`);
            const cost = getRawNumber(`cost_${roundId}`);
            const netProfit = income - cost;
            const limit = parseFloat(document.getElementById(`limit_${roundId}`).value) || 0;
            
            let vpp = 0;
            if (limit > 0) vpp = netProfit / limit;

            document.getElementById(`netProfit_${roundId}`).textContent = netProfit.toLocaleString('th-TH', { maximumFractionDigits: 2 });
            document.getElementById(`valuePerPct_${roundId}`).textContent = vpp.toLocaleString('th-TH', { maximumFractionDigits: 2 });

            let totalInputPct = 0;
            let activeInputPct = 0;
            
            const groups = document.querySelectorAll(`#groupList_${roundId} .group-box`);
            groups.forEach(group => {
                const gId = group.id;
                const gState = state.groupData[gId];
                const pct = parseFloat(group.querySelector('.g-pct').value) || 0;
                totalInputPct += pct;
                if (!gState.isOptOut) activeInputPct += pct;
            });

            const multiplier = activeInputPct > 0 ? (totalInputPct / activeInputPct) : 0;

            const select = document.getElementById(`select_${roundId}`);
            const currentSel = select.value;
            select.innerHTML = '<option value="">-- กรุณาเลือกกลุ่ม --</option>';

            groups.forEach(group => {
                const gId = group.id;
                const gState = state.groupData[gId];
                const pct = parseFloat(group.querySelector('.g-pct').value) || 0;
                const name = group.querySelector('.g-name').value || group.querySelector('.g-name').placeholder;
                
                let effectivePct = 0;
                if (!gState.isOptOut) {
                    effectivePct = pct * multiplier;
                }
                
                const amt = vpp * effectivePct;
                
                let pctDisplay = '';
                if (gState.isOptOut) {
                    pctDisplay = `<br><span style="color:red;font-size:11px;">(ออก - ไม่รับส่วนแบ่ง)</span>`;
                } else if (multiplier > 1 && pct > 0) {
                    pctDisplay = `<br><span style="color:var(--secondary-color);font-size:11px;">(กองกลางเพิ่มให้เป็น ${effectivePct.toFixed(2)}%)</span>`;
                }

                group.querySelector('.g-amt').innerHTML = amt.toLocaleString('th-TH', { maximumFractionDigits: 2 }) + ' บาท' + pctDisplay;
                
                gState.amt = amt;
                gState.pct = pct; 
                gState.effectivePct = effectivePct;
                
                const optOutText = gState.isOptOut ? ' (ออก)' : '';
                const opt = document.createElement('option');
                opt.value = gId; opt.textContent = name + optOutText;
                select.appendChild(opt);
            });

            if (currentSel && state.groupData[currentSel]) select.value = currentSel;

            const status = document.getElementById(`trackerStatus_${roundId}`);
            if (totalInputPct > limit) {
                status.innerHTML = `<b style="color:red;">⚠️ รวมการกรอกแล้ว ${totalInputPct}% (เกิน ${limit}%)!</b>`;
                status.parentElement.style.borderColor = "red";
            } else {
                const rem = Math.round((limit - totalInputPct)*100)/100;
                status.innerHTML = `<b style="color:green;">✅ รวมการกรอกแล้ว: ${totalInputPct}% (เหลือ: ${rem}%)</b>`;
                status.parentElement.style.borderColor = "var(--secondary-color)";
            }

            calculateSidePanel(roundId); 
        }

        function onGroupSelectChange(roundId) {
            renderSidePanel(roundId);
        }

        function renderSidePanel(roundId) {
            const state = roundInstances[roundId];
            const selId = document.getElementById(`select_${roundId}`).value;
            const container = document.getElementById(`subItemList_${roundId}`);
            const rIndex = getRoundIndex(roundId);
            const showLeave = rIndex > 0 ? 'inline-block' : 'none';
            
            const targetInput = document.getElementById(`target_${roundId}`);
            const expandInput = document.getElementById(`expand_${roundId}`);
            
            container.innerHTML = ''; 

            if (!selId || !state.groupData[selId]) {
                targetInput.value = '0'; expandInput.value = '';
                calculateSidePanel(roundId);
                return;
            }

            const gData = state.groupData[selId];
            targetInput.value = gData.pct; 
            expandInput.value = gData.expandPct || ''; 

            gData.subItems.forEach((sub, index) => {
                let removeHtml = '';
                if (index >= 2) removeHtml = `<button class="remove-btn" onclick="removeSubItem('${roundId}', '${selId}', '${sub.id}')">ลบ</button>`;

                const optOutClass = sub.isOptOut ? 'opted-out-box' : '';
                const btnText = sub.isOptOut ? 'กลับเข้า' : 'ออก';
                const btnClass = sub.isOptOut ? 'leave-btn active' : 'leave-btn';
                
                const starClass = sub.isStarred ? 'star-btn active' : 'star-btn';
                const starText = sub.isStarred ? '⭐ กลุ่มเรา' : '☆ เลือกกลุ่มเรา';
                const safeName = (sub.name || '').replace(/"/g, '&quot;');
                
                const teamMode = sub.teamCalcMode || 'pct';
                const placeholderText = teamMode === 'parts' ? 'จำนวนส่วน' : '%';

                let teamHtml = '';
                if (sub.isStarred) {
                    let rowsHtml = '';
                    (sub.teamMembers || []).forEach(tm => {
                        rowsHtml += `
                            <div class="team-member-row" data-id="${tm.id}">
                                <input type="text" class="tm-name-input" placeholder="ชื่อลูกทีม" value="${(tm.name||'').replace(/"/g, '&quot;')}" oninput="updateTeamMember('${roundId}', '${selId}', '${sub.id}', '${tm.id}', 'name', this.value)">
                                <input type="text" inputmode="decimal" class="tm-pct-input" placeholder="${placeholderText}" value="${tm.pct}" onkeydown="allowOnlyNumbers(event)" oninput="updateTeamMember('${roundId}', '${selId}', '${sub.id}', '${tm.id}', 'pct', this.value); formatPercentInput(this, 'side', '${roundId}');">
                                <span class="tm-amt">0 บาท</span>
                                <button class="remove-btn" style="padding:4px 6px;" onclick="removeTeamMember('${roundId}', '${selId}', '${sub.id}', '${tm.id}')">ลบ</button>
                            </div>
                        `;
                    });
                    
                    teamHtml = `
                        <div class="team-section">
                            <div class="team-header">
                                <span>👥 ลูกทีม (ตัดจากยอดเงินของกลุ่มนี้)</span>
                                <select class="team-mode-select" onchange="updateTeamMode('${roundId}', '${selId}', '${sub.id}', this.value)" style="padding:2px 4px; font-size:11px; border-radius:4px; border:1px solid #ccc; background:#fff; color:#555;">
                                    <option value="pct" ${teamMode !== 'parts' ? 'selected' : ''}>แบบ %</option>
                                    <option value="parts" ${teamMode === 'parts' ? 'selected' : ''}>แบบกลุ่ม (ส่วน)</option>
                                </select>
                            </div>
                            ${rowsHtml}
                            <button class="add-tm-btn" onclick="addTeamMember('${roundId}', '${selId}', '${sub.id}')">+ เพิ่มลูกทีม</button>
                            <div class="team-summary-text"></div>
                        </div>
                    `;
                }

                const html = `
                    <div class="sub-item-box ${optOutClass}" id="${sub.id}">
                        <div class="sub-item-header" style="flex-wrap: wrap;">
                            <input type="text" placeholder="ชื่อผู้รับ/รายละเอียด" value="${safeName}" oninput="updateSubItemData('${roundId}', '${selId}', '${sub.id}', 'name', this.value)" style="flex: 1 1 100px; min-width: 100px; margin-bottom: 5px;">
                            <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; margin-bottom: 5px;">
                                <button class="${starClass}" onclick="toggleSubItemStar('${roundId}', '${selId}', '${sub.id}')">${starText}</button>
                                <button class="${btnClass}" style="display:${showLeave};" onclick="toggleSubItemOptOut('${roundId}', '${selId}', '${sub.id}')">${btnText}</button>
                                ${removeHtml}
                            </div>
                        </div>
                        <div class="sub-item-row">
                            <input type="text" inputmode="decimal" class="s-pct" placeholder="ใส่ %" value="${sub.pct}" onkeydown="allowOnlyNumbers(event)" oninput="updateSubItemData('${roundId}', '${selId}', '${sub.id}', 'pct', this.value); formatPercentInput(this, 'side', '${roundId}');">
                            <span class="sub-amount-display s-amt">0 บาท</span>
                        </div>
                        ${teamHtml}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            calculateSidePanel(roundId);
        }

        function updateSubItemData(roundId, groupId, subId, field, value) {
            const state = roundInstances[roundId];
            if (!state.groupData[groupId]) return;
            const sub = state.groupData[groupId].subItems.find(s => s.id === subId);
            if (sub) {
                if (field === 'pct') {
                    value = value.replace(/[^0-9.]/g, '');
                    const parts = value.split('.');
                    if (parts.length > 2) value = parts[0] + '.' + parts.slice(1).join('');
                }
                sub[field] = value;
            }
        }

        function addSubItem(roundId) {
            const selId = document.getElementById(`select_${roundId}`).value;
            if (!selId) { alert("กรุณาเลือกกลุ่มก่อนเพิ่มส่วนแบ่งย่อย"); return; }
            
            const state = roundInstances[roundId];
            state.subItemCount++;
            const subId = `${selId}_s_${Date.now()}_${state.subItemCount}`;

            state.groupData[selId].subItems.push({ id: subId, name: '', pct: '', isOptOut: false, isStarred: false, teamMembers: [], teamCalcMode: 'pct' });
            renderSidePanel(roundId); 
        }

        function removeSubItem(roundId, groupId, subId) {
            saveToUndoHistory();
            const state = roundInstances[roundId];
            state.groupData[groupId].subItems = state.groupData[groupId].subItems.filter(s => s.id !== subId);
            renderSidePanel(roundId);
        }

        function calculateSidePanel(roundId) {
            const state = roundInstances[roundId];
            const selId = document.getElementById(`select_${roundId}`).value;
            
            let baseAmt = 0; let target = 0; let expand = 0;
            let groupIsOptOut = false;
            
            if (selId && state.groupData[selId]) {
                const gd = state.groupData[selId];
                groupIsOptOut = gd.isOptOut;
                baseAmt = gd.amt;
                target = gd.pct; 
                expand = gd.expandPct || 0;
            }

            const totalTarget = target + expand;

            document.getElementById(`baseAmt_${roundId}`).textContent = baseAmt.toLocaleString('th-TH', { maximumFractionDigits: 2 });
            document.getElementById(`target_${roundId}`).value = target; 
            document.getElementById(`totalTarget_${roundId}`).value = totalTarget; 

            let onePercentValue = 0;
            if (totalTarget > 0) onePercentValue = baseAmt / totalTarget; 
            
            const calcAmt = onePercentValue * totalTarget; 
            document.getElementById(`calcAmt_${roundId}`).textContent = calcAmt.toLocaleString('th-TH', { maximumFractionDigits: 2 });

            let totalInputSubPct = 0;
            let activeInputSubPct = 0;

            const subs = document.querySelectorAll(`#subItemList_${roundId} .sub-item-box`);
            subs.forEach(sub => {
                const subId = sub.id;
                const subState = state.groupData[selId].subItems.find(s => s.id === subId);
                const p = parseFloat(sub.querySelector('.s-pct').value) || 0;
                totalInputSubPct += p;
                if (!subState.isOptOut) activeInputSubPct += p;
            });

            const subMultiplier = activeInputSubPct > 0 ? (totalInputSubPct / activeInputSubPct) : 0;

            let totAmt = 0;
            subs.forEach(sub => {
                const subId = sub.id;
                const subState = state.groupData[selId].subItems.find(s => s.id === subId);
                const p = parseFloat(sub.querySelector('.s-pct').value) || 0;
                
                let effectiveP = 0;
                if (!subState.isOptOut && !groupIsOptOut) {
                    effectiveP = p * subMultiplier;
                }
                
                let a = onePercentValue * effectiveP;
                totAmt += a;

                let displayHtml = a.toLocaleString('th-TH', { maximumFractionDigits: 2 }) + ' บาท';
                
                if (groupIsOptOut || subState.isOptOut) {
                    displayHtml = `<span style="color:red; text-decoration:line-through;">${displayHtml}</span><br><span style="font-size:11px; color:red;">(ออก)</span>`;
                } else if (subMultiplier > 1 && p > 0) {
                    displayHtml += `<br><span style="font-size:11px; color:var(--secondary-color);">*ปรับเพิ่มเป็น ${effectiveP.toFixed(2)}%</span>`;
                }
                
                sub.querySelector('.s-amt').innerHTML = displayHtml;

                if (subState.isStarred && subState.teamMembers) {
                    let teamTotPct = 0;
                    let teamTotAmt = 0;
                    const mode = subState.teamCalcMode || 'pct';
                    
                    let totalParts = 0;
                    const tmRows = sub.querySelectorAll('.team-member-row');
                    if (mode === 'parts') {
                        tmRows.forEach(tmRow => {
                            totalParts += parseFloat(tmRow.querySelector('.tm-pct-input').value) || 0;
                        });
                    }

                    tmRows.forEach(tmRow => {
                        const tmId = tmRow.dataset.id;
                        const tmState = subState.teamMembers.find(t => t.id === tmId);
                        const inputValue = parseFloat(tmRow.querySelector('.tm-pct-input').value) || 0;
                        
                        let tmPct = 0;
                        let tmAmt = 0;
                        
                        if (mode === 'pct') {
                            tmPct = inputValue;
                            tmAmt = p > 0 ? a * (tmPct / p) : 0;
                        } else if (mode === 'parts') {
                            if (totalParts > 0) {
                                tmPct = p * (inputValue / totalParts);
                                tmAmt = a * (inputValue / totalParts);
                            }
                        }
                        
                        teamTotPct += tmPct;
                        teamTotAmt += tmAmt;
                        
                        let displayVal = tmAmt.toLocaleString('th-TH', {maximumFractionDigits:2}) + ' บ.';
                        if (mode === 'parts' && totalParts > 0) {
                            displayVal = `<span style="font-size:10px; color:#888;">(${tmPct.toFixed(2)}%)</span> ` + displayVal;
                        }
                        
                        tmRow.querySelector('.tm-amt').innerHTML = displayVal;
                        
                        if (tmState) tmState.pct = tmRow.querySelector('.tm-pct-input').value;
                    });
                    
                    const summaryEl = sub.querySelector('.team-summary-text');
                    if (summaryEl) {
                        summaryEl.innerHTML = `รวมแบ่งลูกทีม: <b>${teamTotPct.toFixed(2)}%</b> | คงเหลือของคุณ: <b style="color:var(--primary-color);">${(a - teamTotAmt).toLocaleString('th-TH', {maximumFractionDigits:2})} บ.</b>`;
                    }
                }
            });

            const alertSp = document.getElementById(`alert_${roundId}`);
            const rTot = Math.round(totalInputSubPct*100)/100;
            const rTar = Math.round(totalTarget*100)/100; 

            if (rTot > rTar) alertSp.innerHTML = `<span style="color:red;">(⚠️ รวมการกรอกเกิน ${(rTot-rTar).toFixed(2)}%)</span>`;
            else if (rTot < rTar) alertSp.innerHTML = `<span style="color:#FF9800;">(ขาดอีก ${(rTar-rTot).toFixed(2)}%)</span>`;
            else alertSp.innerHTML = `<span style="color:green;">(ครบ)</span>`;

            document.getElementById(`totSubPct_${roundId}`).textContent = rTot;
            document.getElementById(`totSubAmt_${roundId}`).textContent = totAmt.toLocaleString('th-TH', { maximumFractionDigits: 2 });
            document.getElementById(`remAmt_${roundId}`).textContent = (baseAmt - totAmt).toLocaleString('th-TH', { maximumFractionDigits: 2 });

            const itemId = roundId.split('_r_')[0];
            calculateOurGroupTotal(itemId);
        }

        window.onload = () => {
            let visitCount = localStorage.getItem('moneyHeist_visitCount') || 0;
            visitCount++; 
            localStorage.setItem('moneyHeist_visitCount', visitCount);
            
            const counterDisplay = document.getElementById('visitor_counter_display');
            if(counterDisplay) {
                counterDisplay.innerText = visitCount.toLocaleString('th-TH');
            }

            const saved = localStorage.getItem('profitShareState');
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    globalIdCounter = state.globalIdCounter || 0;
                    if (state.items.length === 0) throw new Error("No items");

                    state.items.forEach((item, index) => { restoreItem(item, index === 0); });
                    
                    if(state.activeTabId && document.getElementById(`menu_${state.activeTabId}`)) {
                        switchTab(state.activeTabId);
                    } else {
                        const firstTab = document.querySelector('.calc-tab');
                        if (firstTab) switchTab(firstTab.id.replace('menu_', ''));
                    }
                } catch(e) {
                    initDefaultState();
                }
            } else {
                initDefaultState();
            }
        };
    </script>
</body>
</html>
